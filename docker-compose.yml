services:
  postgres:
    image: postgres:16
    container_name: project3-postgres
    environment:
      POSTGRES_DB: expense_db
      POSTGRES_USER: team9
      POSTGRES_PASSWORD: team9
    ports:
      - "5434:5432"
    volumes:
      - project3_postgres_data:/var/lib/postgresql/data

volumes:
  project3_postgres_data: